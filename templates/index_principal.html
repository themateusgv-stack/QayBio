{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2>Registro de Usuario</h2>
    <form method="POST">
        <label>Nombre de Usuario</label>
        <input type="text" name="nombre" required style="width: 100%; padding: 10px; margin: 10px 0;">
        <label>Número de Teléfono</label>
        <input type="text" name="telefono" required style="width: 100%; padding: 10px; margin: 10px 0;">
        <button type="submit" style="width: 100%; background: var(--naranja); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer;">
            Registrar e ir a comprar
        </button>
    </form>
</div>
{% endblock %}
